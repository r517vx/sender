spring:
  datasource:
    #url: jdbc:postgresql://192.168.0.100:5436/sender
    url: jdbc:postgresql://192.168.0.15:5436/sender
    username: sender
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.yandex.ru
    port: 465
    username: ${YANDEX_SMTP_USER:hello@mobilica.ru}
    password: ${YANDEX_APP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000

logging:
  level:
    root: INFO
    ru: INFO
