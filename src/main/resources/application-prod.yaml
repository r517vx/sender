spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST:smtp.yandex.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000

sender:
  defaults:
    dailyLimit: ${SENDER_DAILY_LIMIT:20}
    minDelaySec: ${SENDER_MIN_DELAY_SEC:90}
    maxDelaySec: ${SENDER_MAX_DELAY_SEC:210}
    maxRetries: ${SENDER_MAX_RETRIES:2}